modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/whidte/trulybestfriends/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="trulybestfriends.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="l2library"
type="optional"
versionRange="[3.0.8,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="l2tabs"
type="optional"
versionRange="[3.0.5,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="curios"
type="optional"
versionRange="[9.5.1,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ftbteams"
type="optional"
versionRange="[2101.1.2,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="iceandfire"
type="optional"
versionRange="[0,)"
ordering="AFTER"
side="BOTH"
