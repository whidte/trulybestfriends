modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/whidte/trulybestfriends/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="logo.png"
credits="Thanks to all pet lovers!"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="l2library"
    mandatory=false
    versionRange="[0.3,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="l2tabs"
    mandatory=false
    versionRange="[0.3,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="iceandfire"
    mandatory=false
    versionRange="[0.0,)"
    ordering="AFTER"
    side="BOTH"
